    <style>
      /* Dark mode: override any inline colors saved by the rich-text editor */
      body.dark-mode .article-body * {
        color: #ede8e2 !important;

      /* Hide Google Translate toolbar completely */
      .goog-te-banner-frame, .skiptranslate { display: none !important; }

    <script>
      // Always start in English — wipe any lingering translation cookie before GT loads
      document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
      document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + window.location.hostname;
    </script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'fr,es,de',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
